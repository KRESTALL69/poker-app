# Poker App (dontworryclub.pro) — nginx site config.
#
# Reference copy of the live config at /etc/nginx/sites-available/dontworryclub.pro
# on the VPS (kept in sync manually — certbot and later edits mutate the live
# file in place, this copy is documentation, not something nginx reads).
#
# Canonical domain: https://www.dontworryclub.pro — matches the existing
# Vercel deployment's own prior behavior (apex 307-redirected to www).
#
# Upstream is loopback-only (127.0.0.1:3003) — never expose this port
# publicly. Does not touch clock.re-raise.ru or re-raise site configs.
#
# TLS blocks below were added by `certbot --nginx` (see docs/VPS_DEPLOYMENT.md
# and docs/MIGRATION_PLAN.md Этап 9 for the cutover history).

server {
    server_name dontworryclub.pro;

    return 301 https://www.dontworryclub.pro$request_uri;

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/dontworryclub.pro/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/dontworryclub.pro/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    server_name www.dontworryclub.pro;

    client_max_body_size 20m;

    # Locally-stored avatars (LocalAvatarStorageRepository) -- served
    # directly from disk, bypassing Node entirely. Same host path as the
    # app container's bind mount (compose.yaml's app.volumes). Same pattern
    # as ReRaise's /etc/nginx/sites-available/re-raise.
    location ^~ /storage/ {
        alias /opt/poker-app/storage/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade support.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/dontworryclub.pro/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/dontworryclub.pro/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = dontworryclub.pro) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name dontworryclub.pro;
    return 404; # managed by Certbot


}

server {
    if ($host = www.dontworryclub.pro) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name www.dontworryclub.pro;
    return 404; # managed by Certbot


}

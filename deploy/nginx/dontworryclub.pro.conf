# Poker App (dontworryclub.pro) — nginx site config.
#
# Pre-TLS version: HTTP only. certbot --nginx will rewrite this file in
# place to add the `listen 443 ssl` blocks and the HTTP->HTTPS redirect
# once the certificate is issued (same flow already used for re-raise.ru —
# see /etc/nginx/sites-available/re-raise for the post-certbot shape).
#
# Canonical domain: https://www.dontworryclub.pro — matches the existing
# Vercel deployment's own behavior (apex currently 307-redirects to www;
# confirmed by curl before writing this file, not assumed).
#
# Upstream is loopback-only (127.0.0.1:3003) — never expose this port
# publicly. Does not touch clock.re-raise.ru or re-raise site configs.

server {
    listen 80;
    listen [::]:80;
    server_name dontworryclub.pro;

    return 301 https://www.dontworryclub.pro$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.dontworryclub.pro;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade support.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}

name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Fast, cheap checks — safe to cancel a superseded run of this job the
  # moment a newer commit is pushed, since it has no side effects.
  checks:
    runs-on: ubuntu-latest
    concurrency:
      group: checks-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # Sanity build on the runner, separate from the real production image
      # built on the VPS in the `deploy` job below. This one never sees
      # DATABASE_URL or any other VPS-only secret — lib/db/index.ts resolves
      # its Postgres connection lazily (see the comment there) specifically
      # so `next build` doesn't need one. NEXT_PUBLIC_APP_URL only needs to
      # be a syntactically valid URL: it's baked into the client bundle for
      # absolute links, never dereferenced during the build itself.
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: https://www.dontworryclub.pro

  # Everything below runs on the VPS: production `next build` (needs
  # /opt/poker-app/.env, not available on the GitHub runner), pending
  # migrations, container recreation, and proof that the new code is
  # actually live and healthy.
  # cancel-in-progress is deliberately false: a `docker compose up -d`
  # recreation caught mid-flight by a cancellation is exactly the kind of
  # "server left in an in-between state" the app owner does not want. A
  # newer push instead queues behind this one (and if a third push lands
  # while one is already queued, GitHub keeps only the newest queued run —
  # older superseded commits are dropped, not deployed one by one), so
  # deploys always run to full completion and the server always converges
  # on the latest pushed commit.
  deploy:
    needs: checks
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: Configure SSH
        run: |
          set -Eeuo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.VPS_SSH_PORT || 22 }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      # Single SSH session, single strict-mode remote script: build the new
      # image, apply any pending Drizzle migrations, recreate only the app
      # container, prove the running container is that exact image (not a
      # no-op deploy), wait for a genuine running+healthy state (not a
      # one-shot check), smoke-test the public site, and only then prune
      # dangling images. Any failing command aborts the whole script
      # (set -Eeuo pipefail) and the step — and the job — end red.
      # poker-clock-db, the external network, volumes, the storage bind
      # mount, re-raise and poker-clock are never touched: only `docker
      # compose build app|migrate` / `run --rm migrate` / `up -d --no-deps
      # app` run, never `down`.
      - name: Build, migrate, deploy and verify on VPS
        run: |
          set -Eeuo pipefail
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.VPS_SSH_PORT || 22 }}" \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=6 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" bash -s <<'REMOTE_SCRIPT'
          set -Eeuo pipefail

          EXPECTED_SHA="${{ github.sha }}"
          cd /opt/poker-app

          echo "== Syncing repo to the commit this workflow ran for =="
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          ACTUAL_SHA="$(git rev-parse HEAD)"
          echo "Expected SHA: $EXPECTED_SHA"
          echo "Actual SHA:   $ACTUAL_SHA"
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "SHA mismatch — main on the VPS does not match the commit this workflow was triggered for. Refusing to deploy." >&2
            exit 1
          fi

          # Read the real image name from compose.yaml instead of assuming
          # it — this is what `docker compose build/up` actually resolve to,
          # so it can never drift from the compose file.
          IMAGE_NAME="$(docker compose config --images app)"
          echo "Image name from compose.yaml: $IMAGE_NAME"

          echo "== Building production image (npm run build happens in here, using /opt/poker-app/.env) =="
          docker compose build app

          NEW_IMAGE_ID="$(docker image inspect "$IMAGE_NAME" --format '{{.Id}}')"
          echo "New image ID: $NEW_IMAGE_ID"

          # Idempotent: scripts/migrate.mjs (drizzle-orm/postgres-js/migrator)
          # tracks applied migrations in its own journal table and only
          # applies files that haven't run yet. A deploy with no new schema
          # migration is a no-op here.
          echo "== Applying any pending database migrations =="
          docker compose build migrate
          docker compose run --rm migrate

          echo "== Recreating the app container only =="
          docker compose up -d --no-deps app

          CONTAINER_ID="$(docker compose ps -q app)"
          if [ -z "$CONTAINER_ID" ]; then
            echo "No 'app' container found after 'docker compose up -d'." >&2
            exit 1
          fi

          RUNNING_IMAGE_ID="$(docker inspect "$CONTAINER_ID" --format '{{.Image}}')"
          echo "Running container's image ID: $RUNNING_IMAGE_ID"
          echo "Running container created at: $(docker inspect "$CONTAINER_ID" --format '{{.Created}}')"

          if [ "$RUNNING_IMAGE_ID" != "$NEW_IMAGE_ID" ]; then
            echo "The running container is not on the image that was just built — the deploy did not take effect." >&2
            docker compose ps
            exit 1
          fi

          echo "== Waiting for the container to report running+healthy =="
          DEPLOY_TIMEOUT=120
          INTERVAL=5
          ELAPSED=0
          while true; do
            STATUS="$(docker inspect "$CONTAINER_ID" --format '{{.State.Status}}')"
            HEALTH="$(docker inspect "$CONTAINER_ID" --format '{{.State.Health.Status}}')"

            if [ "$STATUS" = "exited" ] || [ "$STATUS" = "dead" ]; then
              echo "Container entered terminal state '$STATUS'." >&2
              docker compose ps
              docker compose logs --tail 200 app
              exit 1
            fi

            if [ "$HEALTH" = "unhealthy" ]; then
              echo "Container reported unhealthy." >&2
              docker compose ps
              docker compose logs --tail 200 app
              exit 1
            fi

            if [ "$STATUS" = "running" ] && [ "$HEALTH" = "healthy" ]; then
              echo "Container is running and healthy after ${ELAPSED}s."
              break
            fi

            if [ "$ELAPSED" -ge "$DEPLOY_TIMEOUT" ]; then
              echo "Timed out after ${DEPLOY_TIMEOUT}s waiting for running+healthy (status=$STATUS health=$HEALTH)." >&2
              docker compose ps
              docker compose logs --tail 200 app
              exit 1
            fi

            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "== Smoke-testing the public site =="

          echo "GET https://www.dontworryclub.pro/api/health"
          HEALTH_BODY="$(curl --fail --silent --show-error https://www.dontworryclub.pro/api/health)"
          echo "Body: $HEALTH_BODY"
          if [ "$HEALTH_BODY" != '{"ok":true}' ]; then
            echo "Unexpected /api/health body: $HEALTH_BODY" >&2
            exit 1
          fi

          echo "GET https://www.dontworryclub.pro/"
          curl --fail --silent --show-error https://www.dontworryclub.pro/ > /dev/null

          echo "== All checks passed — pruning dangling images =="
          docker image prune -f

          echo "Deploy complete: $ACTUAL_SHA is live and healthy."
          REMOTE_SCRIPT

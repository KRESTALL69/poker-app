services:
  app:
    build:
      context: .
      # NEXT_PUBLIC_* vars are baked into the client JS bundle at build time.
      # Changing them here requires a full rebuild (docker compose build).
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    image: poker-app:latest
    container_name: poker-app
    restart: unless-stopped
    ports:
      # Loopback-only — nginx (on the host) terminates TLS and reverse-proxies
      # here; never open this port to 0.0.0.0.
      - "127.0.0.1:3003:3000"
    volumes:
      # Locally-stored avatars (LocalAvatarStorageRepository) — bind mount so
      # uploads survive `docker compose build`/`down`. nginx also serves
      # /storage/ directly from this same host path (/opt/poker-app/storage),
      # bypassing Node entirely. Same pattern as ReRaise's docker-compose.yml.
      - ./storage:/app/public/storage
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      SUPPORT_ADMIN_CHAT_ID: ${SUPPORT_ADMIN_CHAT_ID}
      SESSION_SECRET: ${SESSION_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      GOOGLE_CLIENT_EMAIL: ${GOOGLE_CLIENT_EMAIL}
      GOOGLE_PRIVATE_KEY: ${GOOGLE_PRIVATE_KEY}
      GOOGLE_SHEETS_SPREADSHEET_ID: ${GOOGLE_SHEETS_SPREADSHEET_ID}
      # DATABASE_URL resolves poker-clock-db by its Docker-internal service
      # name because of the `networks:` override below, joining the same
      # external network poker-clock-db publishes itself on. Never goes over
      # the host's published 127.0.0.1:5432.
      DATABASE_URL: ${DATABASE_URL}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # One-shot migration runner — never part of the default `docker compose up`
  # (profile gate). Applies lib/db/migrations/ to whatever DATABASE_URL
  # points at via scripts/migrate.mjs. Run explicitly and deliberately:
  #   docker compose run --rm migrate
  migrate:
    build:
      context: .
      target: migrator
    image: poker-app-migrator:latest
    profiles: ["migrate"]
    volumes:
      # Same bind mount as the app service — lets one-off maintenance
      # scripts (e.g. scripts/migrate-avatars-to-local.mjs) write into the
      # same avatar storage the app serves.
      - ./storage:/app/public/storage
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}

networks:
  default:
    name: poker-clock_default
    external: true
